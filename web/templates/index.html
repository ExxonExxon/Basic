<!-- 
[LEAD_SUBMISSION_WIDGET_SPECIFICATION]
This file implements the core customer-facing interface for Tradsiee lead generation.
It is architected as a high-friction, multi-step wizard designed to qualify intent 
through video-based problem descriptions.

[ARCHITECTURAL_WORKFLOW]
- Step 1 (Identification): Captures lead contact identity (E.164 phone normalization).
- Step 2 (Payload Ingestion): Orchestrates the acquisition of the primary lead asset (video) 
  and qualitative context (textual description). 
- Step 3 (Terminal Success): Final confirmation of lead receipt and persistence.

[MULTIMEDIA_PIPELINE_ENGINE]
- Direct-to-Cloud Upload: Implements an unsigned client-side upload strategy to Cloudinary.
- Adaptive Transmission: Automatically switches between single-stream and chunked 
  (multipart) uploading based on a 95MB file size threshold to ensure 4K asset integrity.
- Real-time Progress Instrumentation: Uses XHR event listeners to drive reactive UI progress bars.

[STATE_MANAGEMENT_STRATEGY]
- Transition Logic: Managed via the 'tsGoStep(n)' orchestration function.
- Data Aggregation: Collects transient DOM state into a final JSON payload for the FastAPI backend.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradsiee Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* [WIDGET_CSS_SCOPE] 
           Fully isolated styling to prevent collisions when embedded on 3rd party host sites.
        */
        #tradsiee-widget-root {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            color: #1C1C1E;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        #tradsiee-widget-root *, #tradsiee-widget-root *::before, #tradsiee-widget-root *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        #tradsiee-widget-root .ts-step { display: none; animation: tsFadeUp 0.35s cubic-bezier(0.2, 0, 0, 1) forwards; }
        #tradsiee-widget-root .ts-step.active { display: block; }
        @keyframes tsFadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #tradsiee-widget-root .ts-card { background: #ffffff; border-radius: 32px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 24px rgba(0,0,0,0.06); padding: 28px; width: 100%; }
        #tradsiee-widget-root .ts-header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        #tradsiee-widget-root .ts-logo { width: 36px; height: 36px; background: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 18px; flex-shrink: 0; }
        #tradsiee-widget-root .ts-header-text h3 { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; line-height: 1.2; }
        #tradsiee-widget-root .ts-header-text p { font-size: 11px; font-weight: 600; color: #8E8E93; margin-top: 2px; }
        #tradsiee-widget-root .ts-progress { display: flex; gap: 6px; margin-bottom: 24px; }
        #tradsiee-widget-root .ts-progress-dot { height: 3px; flex: 1; border-radius: 99px; background: #F2F2F7; transition: background 0.3s ease; }
        #tradsiee-widget-root .ts-progress-dot.done { background: #000; }
        #tradsiee-widget-root .ts-progress-dot.active { background: #007AFF; }
        #tradsiee-widget-root .ts-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #8E8E93; display: block; margin-bottom: 8px; }
        #tradsiee-widget-root .ts-input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.08); background: #F2F2F7; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600; color: #1C1C1E; outline: none; transition: all 0.2s ease; appearance: none; }
        #tradsiee-widget-root .ts-input:focus { background: #fff; border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0,122,255,0.12); }
        #tradsiee-widget-root .ts-phone-row { display: flex; gap: 8px; }
        #tradsiee-widget-root .ts-upload-zone { border: 2px dashed rgba(0,0,0,0.1); border-radius: 20px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s ease; background: #F2F2F7; position: relative; }
        #tradsiee-widget-root .ts-upload-zone:hover { border-color: #007AFF; background: rgba(0,122,255,0.04); }
        #tradsiee-widget-root .ts-upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        #tradsiee-widget-root .ts-video-preview { width: 100%; border-radius: 16px; overflow: hidden; background: #000; margin-top: 12px; display: none; position: relative; }
        #tradsiee-widget-root .ts-video-preview video { width: 100%; max-height: 180px; object-fit: cover; display: block; }
        #tradsiee-widget-root .ts-upload-progress { display: none; margin-top: 12px; }
        #tradsiee-widget-root .ts-upload-progress-track { background: #F2F2F7; border-radius: 99px; height: 5px; overflow: hidden; }
        #tradsiee-widget-root .ts-upload-progress-fill { height: 100%; width: 0%; background: #007AFF; border-radius: 99px; transition: width 0.15s ease; }
        #tradsiee-widget-root .ts-btn { width: 100%; padding: 15px; border-radius: 18px; border: none; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0, 0, 1); display: flex; align-items: center; justify-content: center; gap: 8px; }
        #tradsiee-widget-root .ts-btn-primary { background: #000; color: #fff; }
        #tradsiee-widget-root .ts-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: tsSpin 0.7s linear infinite; display: none; }
        @keyframes tsSpin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="tradsiee-widget-root">
    <div class="ts-card">
        <div class="ts-header">
            <div class="ts-logo">T</div>
            <div class="ts-header-text">
                <h3>Get an Instant Quote</h3>
                <p>Send a quick video — we'll get back to you fast.</p>
            </div>
        </div>

        <!-- [UI_COMPONENT: PROGRESS_STREAK] 
             Updates via tsGoStep logic to provide visual context of wizard progression.
        -->
        <div class="ts-progress">
            <div class="ts-progress-dot active" id="prog-1"></div>
            <div class="ts-progress-dot" id="prog-2"></div>
            <div class="ts-progress-dot" id="prog-3"></div>
        </div>

        <!-- [STEP_1: IDENTITY_ACQUISITION] 
             Captures primary lead metadata.
        -->
        <div class="ts-step active" id="step-1">
            <div style="display:flex;flex-direction:column;gap:12px;">
                <div>
                    <span class="ts-label">Your Details</span>
                    <div style="display:flex;gap:8px;">
                        <input class="ts-input" id="ts-first" type="text" placeholder="First name">
                        <input class="ts-input" id="ts-last"  type="text" placeholder="Last name">
                    </div>
                </div>
                <div>
                    <div class="ts-phone-row">
                        <select class="ts-input" id="ts-dial"><option value="+61">🇦🇺 +61</option></select>
                        <input class="ts-input" style="flex:1;" id="ts-phone" type="tel" placeholder="400 000 000">
                    </div>
                </div>
                <button class="ts-btn ts-btn-primary" onclick="tsGoStep(2)">Continue</button>
            </div>
        </div>

        <!-- [STEP_2: PAYLOAD_AQUISITION] 
             Manages binary video data and textual problem descriptions.
        -->
        <div class="ts-step" id="step-2">
            <div style="display:flex;flex-direction:column;gap:12px;">
                <div class="ts-upload-zone" id="ts-upload-zone">
                    <input type="file" accept="video/*" capture="environment" id="ts-file-input" onchange="tsHandleFile(this)">
                    <div style="font-size:13px;font-weight:700;">Tap to record or upload video</div>
                    <div style="font-size:11px;color:#8E8E93;">Maximum size: 200MB</div>
                </div>

                <!-- [UI_COMPONENT: UPLOAD_INSTRUMENTATION] 
                     Visualizes the background XHR upload progress to Cloudinary.
                -->
                <div class="ts-upload-progress" id="ts-upload-progress">
                    <div class="ts-upload-progress-track"><div class="ts-upload-progress-fill" id="ts-progress-fill"></div></div>
                    <div style="display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:#8E8E93;margin-top:6px;">
                        <span id="ts-progress-status">Uploading…</span><span id="ts-progress-pct">0%</span>
                    </div>
                </div>

                <div class="ts-video-preview" id="ts-video-preview">
                    <video id="ts-video-el" muted playsinline></video>
                </div>

                <textarea class="ts-input" id="ts-desc" placeholder="Describe what you need help with..."></textarea>
                <button class="ts-btn ts-btn-primary" id="ts-submit-btn" onclick="tsSubmit()">
                    <span id="ts-btn-label">Send My Request</span>
                    <div class="ts-spinner" id="ts-spinner"></div>
                </button>
                <button class="ts-btn" style="background:#F2F2F7;color:#8E8E93;" onclick="tsGoStep(1)">Back</button>
            </div>
        </div>

        <!-- [STEP_3: TERMINATION_SUCCESS] -->
        <div class="ts-step" id="step-3">
            <div style="text-align:center;padding:12px 0;">
                <div style="width:64px;height:64px;background:#F2F2F7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                    <svg width="30" height="30" fill="none" stroke="#34C759" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"/></svg>
                </div>
                <h3 style="font-size:20px;font-weight:800;margin-bottom:8px;">Request Sent!</h3>
                <p style="font-size:13px;color:#8E8E93;">We'll get back to you shortly.</p>
            </div>
        </div>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:10px;font-weight:700;text-transform:uppercase;color:#C7C7CC;">Powered by Tradsiee</div>
</div>

<script>
    /* [SCRIPT_SPECIFICATION]
       Handles the stateful orchestration of the lead-capture widget.
       Manages local wizard navigation, Cloudinary media transmission, and backend persistence.
    */

    const TS_API = window.location.origin.includes('127.0.0.1') || window.location.origin.includes('localhost')
        ? "http://127.0.0.1:8000"
        : window.location.origin;

    // Configuration resolution from environment injection.
    const TS_SLUG          = (new URLSearchParams(window.location.search)).get('slug') || window.TRADSIEE_SLUG || "[[SLUG_PLACEHOLDER]]";
    let TS_CLOUD_NAME    = "[[CLOUD_NAME]]";
    let TS_UPLOAD_PRESET = "[[UPLOAD_PRESET]]";

    let tsFileToUpload  = null;
    let tsActiveXhr     = null;
    let tsUploadPromise = null;
    let tsUploadResult  = null;

    /* [WIZARD_NAVIGATOR] 
       Toggles active functional views and updates progress visual indicators.
    */
    function tsGoStep(n) {
        document.querySelectorAll('.ts-step').forEach((s, i) => s.classList.toggle('active', i + 1 === n));
        document.querySelectorAll('.ts-progress-dot').forEach((d, i) => {
            d.classList.toggle('active', i + 1 === n);
            d.classList.toggle('done', i + 1 < n);
        });
    }

    /* [MEDIA_ACQUISITION_HANDLER] */
    function tsHandleFile(input) {
        tsFileToUpload = input.files[0];
        if (!tsFileToUpload) return;
        document.getElementById('ts-video-el').src = URL.createObjectURL(tsFileToUpload);
        document.getElementById('ts-video-preview').style.display = 'block';
        tsStartUpload();
    }

    /* [UPLOAD_STRATEGY: SINGLE_STREAM] */
    function tsUploadSingle(fill, pct) {
        return new Promise((resolve, reject) => {
            const fd = new FormData();
            fd.append('file', tsFileToUpload);
            fd.append('upload_preset', TS_UPLOAD_PRESET);
            const xhr = new XMLHttpRequest();
            tsActiveXhr = xhr;
            xhr.open('POST', `https://api.cloudinary.com/v1_1/${TS_CLOUD_NAME}/video/upload`);
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const p = Math.min(Math.round((e.loaded / e.total) * 100), 99);
                    fill.style.width = p + '%';
                    pct.textContent  = p + '%';
                }
            };
            xhr.onload = () => (xhr.status === 200) ? resolve(JSON.parse(xhr.responseText)) : reject();
            xhr.onerror = () => reject();
            xhr.send(fd);
        });
    }

    /* [UPLOAD_STRATEGY: CHUNKED_STREAM] 
       Supports large assets (>95MB) through sequential byte-range transmission.
    */
    async function tsUploadChunked(fill, pct, status) {
        const CHUNK = 32 * 1024 * 1024; 
        const total = tsFileToUpload.size;
        const count = Math.ceil(total / CHUNK);
        const uid   = Math.random().toString(36).substring(2, 15);
        let res     = null;

        for (let i = 0; i < count; i++) {
            const start = i * CHUNK;
            const end   = Math.min(start + CHUNK, total);
            const fd    = new FormData();
            fd.append('file', tsFileToUpload.slice(start, end));
            fd.append('upload_preset', TS_UPLOAD_PRESET);

            res = await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                tsActiveXhr = xhr;
                xhr.open('POST', `https://api.cloudinary.com/v1_1/${TS_CLOUD_NAME}/video/upload`);
                xhr.setRequestHeader('X-Unique-Upload-Id', uid);
                xhr.setRequestHeader('Content-Range', `bytes ${start}-${end - 1}/${total}`);
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const p = Math.min(Math.round(((start + e.loaded) / total) * 100), 99);
                        fill.style.width = p + '%';
                        pct.textContent  = p + '%';
                        status.textContent = `Processing part ${i+1}/${count}...`;
                    }
                };
                xhr.onload = () => (xhr.status === 200) ? resolve(JSON.parse(xhr.responseText)) : reject();
                xhr.onerror = () => reject();
                xhr.send(fd);
            });
        }
        return res;
    }

    /* [UPLOAD_ORCHESTRATOR] */
    async function tsStartUpload() {
        if (!tsFileToUpload) return;
        if (tsActiveXhr) tsActiveXhr.abort();
        const fill = document.getElementById('ts-progress-fill');
        const pct  = document.getElementById('ts-progress-pct');
        const status = document.getElementById('ts-progress-status');
        document.getElementById('ts-upload-progress').style.display = 'block';
        
        tsUploadPromise = (async () => {
            const result = tsFileToUpload.size > 95 * 1024 * 1024
                ? await tsUploadChunked(fill, pct, status)
                : await tsUploadSingle(fill, pct);
            tsUploadResult = result;
            fill.style.width = '100%';
            pct.textContent = '100%';
            status.textContent = 'Ready!';
            return result;
        })();
    }

    /* [LEAD_PERSISTENCE_TRANSACTION] 
       Submits aggregated lead data to the backend API.
    */
    async function tsSubmit() {
        if (!tsFileToUpload) return;
        const btn = document.getElementById('ts-submit-btn');
        btn.disabled = true;
        document.getElementById('ts-spinner').style.display = 'block';
        try {
            if (!tsUploadResult) await tsUploadPromise;
            const res = await fetch(`${TS_API}/submit-lead-data/${TS_SLUG}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    video_url:            tsUploadResult.secure_url,
                    customer_phone:       document.getElementById('ts-dial').value + document.getElementById('ts-phone').value,
                    customer_description: document.getElementById('ts-desc').value,
                    first_name:           document.getElementById('ts-first').value,
                    last_name:            document.getElementById('ts-last').value
                })
            });
            if (res.ok) tsGoStep(3);
        } catch (e) { alert('Submission failed. Please try again.'); }
        btn.disabled = false;
        document.getElementById('ts-spinner').style.display = 'none';
    }
</script>
</body>
</html>
