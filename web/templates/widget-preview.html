<!-- 
[LIVE_PREVIEW_SYSTEM_SPECIFICATION]
This file implements the real-time simulation environment for Tradsiee business owners.
It allows tradies to experience the customer journey directly from their portal.

[ARCHITECTURAL_WORKFLOW]
1. Context Acquisition: Extracts the business 'slug' from the URL query parameters.
2. Dynamic Bootstrapping: Injects the Tradsiee 'loader.js' into the DOM to replicate 
   real-world embedding behavior.
3. Functional Testing: Facilitates 'smoke tests' of the lead capture pipeline without 
   leaving the Tradsiee ecosystem.

[UX_PATTERNS]
- Isolated Viewport: Centers the widget in a clean, high-contrast environment for better focus.
- Navigation Bridge: Provides a clear exit path back to the workspace portal.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradsiee Widget | Live Preview</title>
    <style>
        /* [UI_THEME_DEFINITION] */
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { font-weight: 800; letter-spacing: -0.02em; }
        p { color: #666; margin-bottom: 30px; }
        .back-btn {
            text-decoration: none;
            color: #000;
            font-weight: 700;
            font-size: 14px;
            padding: 12px 24px;
            border-radius: 12px;
            background: #eee;
            transition: 0.2s;
        }
        .back-btn:hover { background: #e5e5e5; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Live Preview</h1>
        <p>This page simulates how the Tradsiee Widget will appear on your actual website. Use the widget below to send a test lead!</p>
        <a href="portal.html" class="back-btn">Back to Portal</a>
    </div>

    <!-- [INJECTION_TARGET] The Tradsiee Widget Loader will append the iframe here. -->
    <div id="tradsiee-widget" style="margin-top: 50px;"></div>

    <script src="/config.js"></script>
    <script>
        /* [BOOTSTRAP_ORCHESTRATION] 
           Resolves the tenant context and dynamically loads the widget logic.
        */
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const API_BASE = TRADSIEE_ENV.API_BASE;

        if (slug) {
            // [WIDGET_INJECTION] Dynamically load the loader script with the tenant slug.
            const script = document.createElement('script');
            script.src = `${API_BASE}/loader.js?slug=${slug}`;
            script.async = true;
            document.body.appendChild(script);
        } else {
            // [FALLBACK_STATE] Error handling for missing business context.
            document.querySelector('h1').innerText = "Missing Slug";
            document.querySelector('p').innerText = "Please open this preview from your Tradsiee Portal to see your widget.";
        }
    </script>

</body>
</html>
