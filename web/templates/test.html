<!-- 
[DEBUG_INTERFACE_SPECIFICATION]
This file serves as a development-time diagnostic tool for verifying the Tradsiee widget's 
embedding behavior and data capture pipeline.

[ARCHITECTURAL_INTENT]
1. Environment Simulation: Replicates the 3rd-party host environment to test iframe injection.
2. Slug Resolution: Dynamically fetches the business identifier from the URL to test 
   tenant-specific routing.
3. Injection Verification: Validates the functionality of 'loader.js' in a non-production setting.

[SECURITY_CONSTRAINTS]
- This page should ideally only be reachable during local development or in a protected 
  staging environment to prevent unauthorized configuration discovery.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradsiee Widget | Diagnostic View</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { font-weight: 800; letter-spacing: -0.02em; }
        p { color: #666; margin-bottom: 30px; }
        .back-btn {
            text-decoration: none;
            color: #000;
            font-weight: 700;
            font-size: 14px;
            padding: 12px 24px;
            border-radius: 12px;
            background: #eee;
            transition: 0.2s;
        }
        .back-btn:hover { background: #e5e5e5; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Diagnostic View</h1>
        <p>Use this isolated environment to verify that your business slug and widget configuration are functioning correctly.</p>
        <a href="portal.html" class="back-btn">Back to Portal</a>
    </div>

    <!-- [INJECTION_TARGET] The root element where the loader.js will append the widget iframe. -->
    <div id="tradsiee-widget" style="margin-top: 50px;"></div>

    <script src="/config.js"></script>
    <script>
        /* [BOOTSTRAP_LOGIC] 
           Resolves the active business slug and initializes the dynamic injection script.
        */
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const API_BASE = TRADSIEE_ENV.API_BASE;

        if (slug) {
            // [DYNAMIC_INJECTION] Orchestrates the load of the production-ready loader script.
            const script = document.createElement('script');
            script.src = `${API_BASE}/loader.js?slug=${slug}`;
            script.async = true;
            document.body.appendChild(script);
        } else {
            // [ERROR_STATE] Handles the absence of a 'slug' parameter.
            document.querySelector('h1').innerText = "Identifier Missing";
            document.querySelector('p').innerText = "Please open this preview from your Tradsiee Portal to provide a business slug.";
        }
    </script>

</body>
</html>
