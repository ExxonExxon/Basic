<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | Tradsiee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --blue: #007AFF;
            --blue-light: rgba(0,122,255,0.08);
            --text: #1C1C1E;
            --muted: #8E8E93;
            --border: rgba(0,0,0,0.07);
            --red: #FF3B30;
            --green: #34C759;
            --orange: #FF9500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
        }

        /* ── Ambient Background Orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0;
            animation: orbFloat 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,122,255,0.12) 0%, transparent 70%);
            top: -150px; right: -100px;
            animation-delay: 0.1s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(52,199,89,0.09) 0%, transparent 70%);
            bottom: -100px; left: -80px;
            animation-delay: 0.3s;
        }
        .orb-3 {
            width: 320px; height: 320px;
            background: radial-gradient(circle, rgba(255,149,0,0.07) 0%, transparent 70%);
            top: 40%; right: -60px;
            animation-delay: 0.5s;
        }
        @keyframes orbFloat {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* ── Grid Texture ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Main Container ── */
        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
        }

        /* ── Logo ── */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            opacity: 0;
            transform: translateY(-12px);
            animation: slideDown 0.6s cubic-bezier(0.2,0,0,1) 0.1s forwards;
        }
        .logo-mark {
            width: 44px; height: 44px;
            background: #000;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 900; font-size: 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            position: relative; overflow: hidden;
        }
        .logo-mark::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: rgba(255,255,255,0.08);
            border-radius: 14px 14px 0 0;
        }
        .logo-name { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }

        /* ── Card ── */
        .card {
            background: var(--card);
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow:
                0 2px 0 rgba(255,255,255,0.8) inset,
                0 20px 60px rgba(0,0,0,0.06),
                0 4px 16px rgba(0,0,0,0.04);
            padding: 36px 40px;
            opacity: 0;
            transform: translateY(16px) scale(0.98);
            animation: cardRise 0.7s cubic-bezier(0.2,0,0,1) 0.25s forwards;
        }

        @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
        @keyframes cardRise  { to { opacity: 1; transform: translateY(0) scale(1); } }

        /* ── Step Progress Dots ── */
        .step-progress {
            display: flex;
            gap: 6px;
            margin-bottom: 28px;
        }
        .step-dot {
            height: 3px; flex: 1;
            border-radius: 99px;
            background: var(--bg);
            transition: background 0.4s cubic-bezier(0.2,0,0,1), transform 0.3s ease;
        }
        .step-dot.done   { background: #000; }
        .step-dot.active { background: var(--blue); transform: scaleY(1.2); }

        /* ── Views ── */
        .view { display: none; }
        .view.active { display: block; }

        .view-enter { animation: viewSlideIn 0.4s cubic-bezier(0.2,0,0,1) forwards; }
        .view-exit  { animation: viewSlideOut 0.25s cubic-bezier(0.4,0,1,1) forwards; }

        @keyframes viewSlideIn  { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes viewSlideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-20px); } }

        /* ── Heading ── */
        .heading { margin-bottom: 24px; }
        .heading h2 { font-size: 28px; font-weight: 900; letter-spacing: -0.7px; line-height: 1.15; }
        .heading p  { font-size: 13px; font-weight: 500; color: var(--muted); margin-top: 5px; }

        /* ── Step counter pill ── */
        .step-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .step-pill span { color: var(--blue); }

        /* ── Field ── */
        .field { position: relative; }
        .field label {
            display: block;
            font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--muted); margin-bottom: 7px;
        }
        .field input, .field select, .field textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px; font-weight: 600;
            color: var(--text);
            outline: none;
            transition: all 0.25s cubic-bezier(0.2,0,0,1);
            -webkit-appearance: none; appearance: none;
        }
        .field input::placeholder, .field textarea::placeholder { color: #C7C7CC; font-weight: 500; }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
            transform: translateY(-1px);
        }
        .field input.error, .field select.error {
            border-color: var(--red);
            box-shadow: 0 0 0 4px rgba(255,59,48,0.1);
        }
        .field .helper {
            font-size: 11px; font-weight: 600;
            color: var(--muted);
            margin-top: 6px; padding-left: 2px;
        }

        /* ── Row layouts ── */
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .phone-row { display: flex; gap: 8px; }
        .phone-row select { width: 130px; flex-shrink: 0; cursor: pointer; }
        .phone-row input  { flex: 1; }

        /* ── Stack ── */
        .stack { display: flex; flex-direction: column; gap: 12px; }

        /* ── Password strength bar ── */
        .strength-wrap { margin-top: 8px; display: none; }
        .strength-track {
            height: 3px; border-radius: 99px;
            background: var(--bg);
            overflow: hidden;
        }
        .strength-fill {
            height: 100%; width: 0%; border-radius: 99px;
            transition: width 0.4s cubic-bezier(0.2,0,0,1), background 0.4s ease;
        }
        .strength-label {
            font-size: 10px; font-weight: 700;
            color: var(--muted); margin-top: 5px;
            text-transform: uppercase; letter-spacing: 0.06em;
        }

        /* ── OTP Input ── */
        .otp-input {
            background: var(--bg) !important;
            border: 1.5px solid var(--border) !important;
            border-radius: 16px !important;
            text-align: center !important;
            font-size: 28px !important;
            font-weight: 900 !important;
            letter-spacing: 0.4em !important;
            padding: 20px 16px !important;
            color: var(--text) !important;
            width: 100% !important;
        }
        .otp-input:focus {
            border-color: var(--blue) !important;
            background: #fff !important;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1) !important;
            transform: translateY(-1px) !important;
        }
        .otp-input.error {
            border-color: var(--red) !important;
            box-shadow: 0 0 0 4px rgba(255,59,48,0.1) !important;
            animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97);
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-6px); }
            40%      { transform: translateX(6px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }

        /* ── Resend timer ── */
        .resend-row {
            text-align: center;
            font-size: 13px; font-weight: 600;
            color: var(--muted); margin-top: 4px;
        }
        .resend-btn {
            background: none; border: none; cursor: pointer;
            color: var(--blue); font-weight: 700; font-size: 13px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: none;
            transition: opacity 0.2s;
        }
        .resend-btn:hover { opacity: 0.7; }

        /* ── Buttons ── */
        .btn-primary {
            width: 100%; padding: 16px;
            border-radius: 18px; border: none;
            background: #000; color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 12px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.1em;
            cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.25s cubic-bezier(0.2,0,0,1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary::before {
            content: ''; position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: rgba(255,255,255,0.06);
            pointer-events: none;
        }
        .btn-primary:hover { background: #1C1C1E; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .btn-primary:active { transform: scale(0.98); box-shadow: none; }
        .btn-primary:disabled { background: #C7C7CC; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-ghost {
            width: 100%; padding: 14px;
            border-radius: 18px;
            border: 1.5px solid var(--border);
            background: transparent; color: var(--muted);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-ghost:hover { background: var(--bg); color: var(--text); }

        /* ── Free badge ── */
        .free-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(52,199,89,0.1);
            border: 1px solid rgba(52,199,89,0.2);
            color: #1D7A3A;
            padding: 5px 12px;
            border-radius: 99px;
            font-size: 11px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-bottom: 20px;
        }
        .free-badge::before { content: '●'; color: var(--green); font-size: 8px; }

        /* ── Spinner ── */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none; flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Full-screen Loader ── */
        #loader {
            display: none; position: fixed; inset: 0;
            background: rgba(242,242,247,0.85);
            backdrop-filter: blur(12px);
            z-index: 200;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
        }
        #loader .l-ring {
            width: 40px; height: 40px;
            border: 3px solid rgba(0,0,0,0.08);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #loader span { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

        /* ── Toast ── */
        #toast-container {
            position: fixed; bottom: 32px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            pointer-events: none;
        }
        .toast {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 20px; border-radius: 20px;
            background: #1C1C1E; color: #fff;
            font-size: 13px; font-weight: 600;
            box-shadow: 0 16px 48px rgba(0,0,0,0.2);
            pointer-events: auto;
            max-width: 340px;
            animation: toastIn 0.4s cubic-bezier(0.2,0,0,1) forwards;
        }
        .toast.toast-exit { animation: toastOut 0.35s cubic-bezier(0.4,0,1,1) forwards; }
        .toast-icon {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 12px; font-weight: 900;
        }
        .toast-error   .toast-icon { background: rgba(255,59,48,0.25);  color: #FF3B30; }
        .toast-success .toast-icon { background: rgba(52,199,89,0.25);  color: #34C759; }
        .toast-info    .toast-icon { background: rgba(0,122,255,0.25);  color: #007AFF; }
        @keyframes toastIn  { from { opacity: 0; transform: translateY(16px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(8px) scale(0.95); } }

        /* ── Footer ── */
        .footer-link {
            text-align: center; margin-top: 20px;
            font-size: 13px; font-weight: 500; color: var(--muted);
            opacity: 0;
            animation: fadeUp 0.6s ease 0.55s forwards;
        }
        .footer-link a { color: var(--blue); font-weight: 700; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="loader">
        <div class="l-ring"></div>
        <span id="loader-label">Creating account…</span>
    </div>

    <div id="toast-container"></div>

    <div class="container">

        <!-- Logo -->
        <div class="logo-wrap">
            <div class="logo-mark">B</div>
            <span class="logo-name">Tradsiee</span>
        </div>

        <!-- Card -->
        <div class="card">

            <!-- Progress dots -->
            <div class="step-progress">
                <div class="step-dot active" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="step-dot" id="dot-3"></div>
            </div>

            <!-- ── Step 1: Account details ── -->
            <div id="step-1" class="view active">
                <div class="heading">
                    <div class="step-pill">Step <span>1</span> of 2</div>
                    <h2>Create your account.</h2>
                    <p>Takes less than 60 seconds.</p>
                </div>

                <div class="stack">
                    <div class="row-2">
                        <div class="field">
                            <label>Business Name</label>
                            <input type="text" id="biz-name" placeholder="Acme Plumbing" autocomplete="organization">
                        </div>
                        <div class="field">
                            <label>Email</label>
                            <input type="email" id="biz-email" placeholder="you@biz.com" autocomplete="email">
                        </div>
                    </div>

                    <div class="field">
                        <label>Phone Number</label>
                        <div class="phone-row">
                            <select id="country-code" class="field">
                                <option value="+61">🇦🇺 +61</option>
                                <option value="+30">🇬🇷 +30</option>
                                <option value="+1">🇺🇸 +1</option>
                                <option value="+44">🇬🇧 +44</option>
                            </select>
                            <input type="tel" id="biz-phone" placeholder="400 000 000" autocomplete="tel">
                        </div>
                    </div>

                    <div class="field">
                        <label>Password</label>
                        <input type="password" id="biz-password" placeholder="8+ characters" autocomplete="new-password" oninput="checkStrength(this.value)">
                        <div class="strength-wrap" id="strength-wrap">
                            <div class="strength-track">
                                <div class="strength-fill" id="strength-fill"></div>
                            </div>
                            <div class="strength-label" id="strength-label">Weak</div>
                        </div>
                    </div>

                    <button class="btn-primary" onclick="register()" id="reg-btn" style="margin-top:4px;">
                        <span>Continue</span>
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
                        </svg>
                        <div class="spinner" id="reg-spinner"></div>
                    </button>
                </div>
            </div>

            <!-- ── Step 2: Phone Verification ── -->
            <div id="step-2" class="view">
                <div class="heading" style="margin-bottom:20px;">
                    <div class="step-pill">Step <span>2</span> of 2</div>
                    <h2>Verify your number.</h2>
                    <p id="verify-subtitle">Enter the 6-digit code sent to your phone.</p>
                </div>

                <div class="stack">
                    <div class="field">
                        <input
                            type="text"
                            inputmode="numeric"
                            pattern="[0-9]*"
                            id="verify-code"
                            maxlength="6"
                            placeholder="000000"
                            class="otp-input"
                            oninput="onOtpInput(this)"
                            onkeydown="if(event.key==='Enter') verifyCode()"
                        >
                    </div>

                    <div class="resend-row">
                        <span id="timer-text">Resend in <b id="timer-count">30</b>s</span>
                        <button class="resend-btn" id="resend-btn" onclick="resendCode()">Resend code</button>
                    </div>

                    <button class="btn-primary" onclick="verifyCode()" id="verify-btn">
                        <span>Verify & Finish</span>
                        <div class="spinner" id="verify-spinner"></div>
                    </button>

                    <button class="btn-ghost" onclick="goBack()">Back</button>
                </div>
            </div>

            <!-- ── Step 3: Success ── -->
            <div id="step-3" class="view">
                <div style="text-align:center; padding: 16px 0 8px;">
                    <div style="width:64px;height:64px;background:rgba(52,199,89,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                        <svg width="30" height="30" fill="none" stroke="#34C759" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                        </svg>
                    </div>
                    <h2 style="font-size:24px;font-weight:900;letter-spacing:-0.5px;margin-bottom:8px;">You're in!</h2>
                    <p style="font-size:14px;color:var(--muted);font-weight:500;line-height:1.6;">Account created. Heading to your dashboard…</p>
                </div>
            </div>

        </div>

        <p class="footer-link">
            Already have an account? <a href="[[PATH_LOGIN]]">Sign in</a>
        </p>
    </div>

    <script>
        const API_BASE = window.location.origin.includes('127.0.0.1') || window.location.origin.includes('localhost')
            ? "http://127.0.0.1:8000"
            : window.location.origin;
        let timerInterval = null;

        // ── Toast ──
        function toast(message, type = 'error', duration = 4000) {
            const icons = { error: '✕', success: '✓', info: 'i' };
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.innerHTML = `<div class="toast-icon">${icons[type]}</div><span>${message}</span>`;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => {
                el.classList.add('toast-exit');
                setTimeout(() => el.remove(), 350);
            }, duration);
        }

        // ── Step navigation ──
        function goToStep(n) {
            const dots = [document.getElementById('dot-1'), document.getElementById('dot-2'), document.getElementById('dot-3')];
            dots.forEach((d, i) => {
                d.classList.remove('active', 'done');
                if (i + 1 < n) d.classList.add('done');
                else if (i + 1 === n) d.classList.add('active');
            });

            const current = document.querySelector('.view.active');
            if (current) {
                current.classList.add('view-exit');
                setTimeout(() => {
                    current.classList.remove('active', 'view-exit');
                    const next = document.getElementById(`step-${n}`);
                    next.classList.add('active', 'view-enter');
                    setTimeout(() => next.classList.remove('view-enter'), 400);
                }, 240);
            }
        }

        function goBack() {
            // Animate right to left (reverse)
            const style = document.createElement('style');
            style.textContent = `.view-enter { animation: viewSlideInReverse 0.4s cubic-bezier(0.2,0,0,1) forwards !important; } @keyframes viewSlideInReverse { from { opacity:0; transform:translateX(-24px); } to { opacity:1; transform:translateX(0); } }`;
            document.head.appendChild(style);
            goToStep(1);
            setTimeout(() => style.remove(), 500);
            clearInterval(timerInterval);
        }

        // ── Password strength ──
        function checkStrength(p) {
            const wrap = document.getElementById('strength-wrap');
            const fill = document.getElementById('strength-fill');
            const label = document.getElementById('strength-label');

            if (!p) { wrap.style.display = 'none'; return; }
            wrap.style.display = 'block';

            let score = 0;
            if (p.length >= 8)  score++;
            if (p.length >= 12) score++;
            if (/[A-Z]/.test(p)) score++;
            if (/[0-9]/.test(p)) score++;
            if (/[^A-Za-z0-9]/.test(p)) score++;

            const levels = [
                { pct: '20%', color: '#FF3B30', text: 'Very weak' },
                { pct: '40%', color: '#FF9500', text: 'Weak' },
                { pct: '60%', color: '#FFCC00', text: 'Fair' },
                { pct: '80%', color: '#34C759', text: 'Strong' },
                { pct: '100%',color: '#30D158', text: 'Very strong' },
            ];
            const lvl = levels[Math.min(score - 1, 4)] || levels[0];
            fill.style.width = lvl.pct;
            fill.style.background = lvl.color;
            label.textContent = lvl.text;
            label.style.color = lvl.color;
        }

        // ── OTP input — filter non-numeric, auto-submit at 6 ──
        function onOtpInput(input) {
            input.value = input.value.replace(/\D/g, '');
            input.classList.remove('error');
            if (input.value.length === 6) verifyCode();
        }

        // ── Resend timer ──
        function startTimer() {
            let t = 30;
            document.getElementById('timer-count').textContent = t;
            document.getElementById('timer-text').style.display = 'inline';
            document.getElementById('resend-btn').style.display = 'none';

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                t--;
                document.getElementById('timer-count').textContent = t;
                if (t <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer-text').style.display = 'none';
                    document.getElementById('resend-btn').style.display = 'inline';
                }
            }, 1000);
        }

        async function resendCode() {
            const phone = localStorage.getItem('temp_phone');
            if (!phone) return;
            document.getElementById('resend-btn').style.display = 'none';
            try {
                await fetch(`${API_BASE}/send-verification`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                toast('New code sent to your phone.', 'info');
                startTimer();
            } catch {
                toast('Could not resend code. Try again.', 'error');
                document.getElementById('resend-btn').style.display = 'inline';
            }
        }

        // ── Step 1: Register ──
        async function register() {
            const name     = document.getElementById('biz-name').value.trim();
            const email    = document.getElementById('biz-email').value.trim();
            const password = document.getElementById('biz-password').value;
            const dial     = document.getElementById('country-code').value;
            const phonePart = document.getElementById('biz-phone').value.trim().replace(/\s+/g, '');
            const fullPhone = dial + phonePart;

            // Validate
            let hasError = false;
            const fields = [
                { id: 'biz-name',     val: name,      msg: 'Business name is required.' },
                { id: 'biz-email',    val: email,      msg: 'Email address is required.' },
                { id: 'biz-phone',    val: phonePart,  msg: 'Phone number is required.' },
                { id: 'biz-password', val: password,   msg: 'Password is required.' },
            ];

            fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (!f.val) { el.classList.add('error'); if (!hasError) { toast(f.msg, 'error'); hasError = true; } }
                else el.classList.remove('error');
            });
            if (hasError) return;

            if (password.length < 8) {
                document.getElementById('biz-password').classList.add('error');
                toast('Password must be at least 8 characters.', 'error');
                return;
            }

            const btn = document.getElementById('reg-btn');
            const spinner = document.getElementById('reg-spinner');
            btn.disabled = true;
            spinner.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ business_name: name, email, password, phone_number: fullPhone })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('temp_phone', fullPhone);
                    sessionStorage.setItem('reg_email', email);
                    sessionStorage.setItem('reg_password', password);

                    // Send verification
                    await fetch(`${API_BASE}/send-verification`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: fullPhone })
                    });

                    // Update verify subtitle
                    const masked = fullPhone.slice(0, -4).replace(/./g, '•') + fullPhone.slice(-4);
                    document.getElementById('verify-subtitle').textContent = `Code sent to ${masked}`;

                    btn.disabled = false;
                    spinner.style.display = 'none';
                    goToStep(2);
                    startTimer();
                } else {
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    toast(data.detail || 'Registration failed. Please try again.', 'error');
                }
            } catch {
                btn.disabled = false;
                spinner.style.display = 'none';
                toast('Connection lost. Please check your internet.', 'error');
            }
        }

        // ── Step 2: Verify OTP ──
        async function verifyCode() {
            const code  = document.getElementById('verify-code').value.trim();
            const phone = localStorage.getItem('temp_phone');
            const input = document.getElementById('verify-code');

            if (code.length !== 6) {
                input.classList.add('error');
                toast('Enter the 6-digit code from your SMS.', 'error');
                return;
            }

            const btn = document.getElementById('verify-btn');
            const spinner = document.getElementById('verify-spinner');
            btn.disabled = true;
            spinner.style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/verify-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, code })
                });
                const data = await res.json();

                if (res.ok) {
                    clearInterval(timerInterval);
                    goToStep(3);
                    toast('Phone verified!', 'success', 2000);

                    // Auto-login
                    const email    = sessionStorage.getItem('reg_email');
                    const password = sessionStorage.getItem('reg_password');

                    if (email && password) {
                        document.getElementById('loader-label').textContent = 'Setting up your workspace…';
                        document.getElementById('loader').style.display = 'flex';

                        try {
                            const loginRes = await fetch(`${API_BASE}/login`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email, password })
                            });
                            const loginData = await loginRes.json();

                            if (loginRes.ok) {
                                localStorage.setItem('tradsiee_slug', loginData.slug);
                                localStorage.setItem('tradsiee_token', loginData.access_token);
                                sessionStorage.removeItem('reg_email');
                                sessionStorage.removeItem('reg_password');
                                setTimeout(() => { window.location.href = '[[PATH_PORTAL]]'; }, 1000);
                                return;
                            }
                        } catch { /* fall through to login page */ }
                    }

                    // Fallback
                    document.getElementById('loader').style.display = 'none';
                    setTimeout(() => { window.location.href = '[[PATH_LOGIN]]'; }, 1800);

                } else {
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    input.classList.add('error');
                    input.value = '';
                    input.focus();
                    toast(data.detail || 'Incorrect code. Please try again.', 'error');
                }
            } catch {
                btn.disabled = false;
                spinner.style.display = 'none';
                toast('Connection error. Please try again.', 'error');
            }
        }

        // Clear error states on input
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', () => el.classList.remove('error'));
        });
    </script>
</body>
</html>
